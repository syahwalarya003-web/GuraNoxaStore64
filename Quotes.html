<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Noxa Store - Quotes | Kata Bijak & Motivasi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1a, #03060c);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Roboto', sans-serif;
            padding: 1.5rem;
            min-height: 100vh;
            scroll-behavior: smooth;
            transition: background 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        /* 6 tema warna neon */
        body.theme-green {
            background: radial-gradient(circle at 30% 20%, #064e3b, #022c22);
        }

        body.theme-blue {
            background: radial-gradient(circle at 70% 40%, #1e3a8a, #0f172a);
        }

        body.theme-cyan {
            background: radial-gradient(circle at 50% 70%, #0e7490, #164e63);
        }

        body.theme-purple {
            background: radial-gradient(circle at 60% 30%, #7e22ce, #4c1d95);
        }

        body.theme-pink {
            background: radial-gradient(circle at 40% 60%, #be185d, #831843);
        }

        body.theme-orange {
            background: radial-gradient(circle at 80% 50%, #c2410c, #7c2d12);
        }

        .app-container {
            max-width: 1600px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* HEADER */
        .top-brand-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 1rem;
        }

        .noxa-store {
            font-size: clamp(1.5rem, 5vw, 2.8rem);
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #f59e0b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px rgba(245, 158, 11, 0.5);
            white-space: nowrap;
            animation: softPulse 2s infinite alternate;
        }

        @keyframes softPulse {
            0% {
                text-shadow: 0 0 4px #f59e0b;
                opacity: 0.95;
            }

            100% {
                text-shadow: 0 0 18px #f59e0b;
                opacity: 1;
            }
        }

        .judul-web-kanan h1 {
            font-size: clamp(1rem, 3.5vw, 1.6rem);
            font-weight: 700;
            background: linear-gradient(120deg, #fef3c7, #fde68a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: right;
        }

        .judul-web-kanan p {
            font-size: 0.65rem;
            color: #ddd;
            text-align: right;
        }

        /* BARIS STATS + SEARCH */
        .top-stats-search {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .total-stats-box {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.4);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
        }

        .total-stats-box span {
            font-size: 0.8rem;
            color: white;
            background: rgba(245, 158, 11, 0.2);
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
        }

        .total-stats-box span strong {
            color: #f59e0b;
        }

        /* SEARCH */
        .search-section {
            max-width: 600px;
            margin: 0;
        }

        .search-row-flex {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .search-wrapper {
            position: relative;
            flex: 1;
            min-width: 250px;
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            opacity: 0.8;
        }

        #searchInput {
            width: 100%;
            padding: 0.8rem 2.5rem 0.8rem 3rem;
            background: rgba(0, 0, 0, 0.6);
            border: 1.5px solid rgba(245, 158, 11, 0.6);
            border-radius: 60px;
            font-size: 0.9rem;
            color: white;
            outline: none;
        }

        #searchInput:focus {
            border-color: #f59e0b;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.3);
        }

        #searchInput::placeholder {
            color: #bbb;
        }

        .clear-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            cursor: pointer;
        }

        .clear-btn:hover {
            background: #f59e0b;
        }

        .btn-refresh-neon {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(245, 158, 11, 0.2);
            border: 1px solid rgba(245, 158, 11, 0.5);
            color: #fef3c7;
            padding: 0.7rem 1.2rem;
            border-radius: 3rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-refresh-neon:hover {
            background: rgba(245, 158, 11, 0.35);
            transform: scale(1.02);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1rem;
            margin: 0.5rem 0 1.5rem;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 60px;
            font-size: 0.8rem;
            flex-wrap: wrap;
            gap: 0.5rem;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .shortcut-msg {
            background: #f59e0b;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            color: #022c22;
            font-weight: bold;
            font-size: 0.7rem;
        }

        /* GRID */
        .materi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        /* ========================================== */
        /* QUOTE CARD STYLES - TANPA KATEGORI & TANPA GAMBAR */
        /* ========================================== */
        .quote-card {
            background: rgba(20, 30, 25, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 1.2rem;
            padding: 1.5rem;
            transition: all 0.3s ease;
            border-left: 4px solid #f59e0b;
            border-right: 1px solid rgba(245, 158, 11, 0.2);
            border-top: 1px solid rgba(245, 158, 11, 0.15);
            border-bottom: 1px solid rgba(245, 158, 11, 0.15);
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            position: relative;
        }

        .quote-card:hover {
            transform: translateY(-5px);
            border-left-color: #fbbf24;
            background: rgba(35, 55, 45, 0.95);
            box-shadow: 0 15px 25px -10px black;
        }

        .quote-icon {
            font-size: 2.5rem;
            opacity: 0.25;
            position: absolute;
            top: 0.8rem;
            right: 1rem;
            font-family: serif;
        }

        .quote-text {
            color: #fff;
            font-size: clamp(1rem, 3vw, 1.15rem);
            line-height: 1.5;
            font-style: italic;
            font-weight: 500;
            z-index: 1;
            padding-right: 1.8rem;
        }

        /* ========================================== */
        /* BUTTON GROUP RESPONSIF */
        /* ========================================== */
        .button-group {
            display: flex;
            gap: 0.8rem;
            margin-top: 0.5rem;
        }

        .button-group .materi-link {
            flex: 1;
            text-decoration: none;
            display: block;
        }

        .btn-quote {
            width: 100%;
            padding: 0.7rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            text-align: center;
            transition: all 0.2s;
            display: inline-block;
            font-family: inherit;
            border: none;
            cursor: pointer;
        }

        /* Tombol Quote aktif */
        .materi-link:not([href=""]) .btn-quote,
        .materi-link:not([href="#"]):not([href=""]):not([href="#"]) .btn-quote {
            background: linear-gradient(95deg, #f59e0b, #d97706);
            color: white;
            animation: btnPulse 2s infinite ease;
        }

        /* Tombol Quote nonaktif */
        .materi-link[href=""] .btn-quote,
        .materi-link[href="#"] .btn-quote {
            background: #2a3a35;
            color: #7a9a8a;
            border: 1px solid #3a5a4a;
            cursor: not-allowed;
            animation: none;
        }

        @keyframes btnPulse {
            0% {
                background: linear-gradient(95deg, #f59e0b, #d97706);
                box-shadow: 0 0 3px #f59e0b;
            }
            50% {
                background: linear-gradient(95deg, #fbbf24, #f59e0b);
                box-shadow: 0 0 10px #fbbf24;
            }
            100% {
                background: linear-gradient(95deg, #f59e0b, #d97706);
                box-shadow: 0 0 3px #f59e0b;
            }
        }

        /* ========================================== */
        /* RESPONSIVE BREAKPOINTS */
        /* ========================================== */
        @media (max-width: 991px) {
            body {
                padding: 1rem;
            }
            .app-container {
                padding: 1rem;
            }
        }

        @media (max-width: 767px) {
            .top-brand-bar {
                flex-direction: column;
                text-align: center;
            }
            .judul-web-kanan h1 {
                text-align: center;
            }
            .noxa-store {
                white-space: normal;
                text-align: center;
            }
            .top-stats-search {
                flex-direction: column;
                align-items: stretch;
            }
            .search-section {
                width: 100%;
            }
            .materi-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
        }

        @media (max-width: 575px) {
            body {
                padding: 0.8rem;
            }
            .app-container {
                padding: 0.8rem;
            }
            .total-stats-box {
                justify-content: center;
                gap: 0.5rem;
            }
            .total-stats-box span {
                font-size: 0.7rem;
                padding: 0.15rem 0.6rem;
            }
            .search-row-flex {
                flex-direction: column;
                width: 100%;
            }
            .search-wrapper {
                width: 100%;
                min-width: auto;
            }
            .btn-refresh-neon {
                width: 100%;
                justify-content: center;
            }
            .button-group {
                flex-direction: column;
                gap: 0.6rem;
            }
            .btn-quote {
                padding: 0.7rem;
                font-size: 0.85rem;
            }
            .quote-card {
                padding: 1.2rem;
            }
            .stats-bar {
                flex-direction: column;
                text-align: center;
                border-radius: 1rem;
                padding: 0.6rem;
            }
            .shortcut-msg {
                font-size: 0.6rem;
            }
            .quote-icon {
                font-size: 1.8rem;
                top: 0.5rem;
                right: 0.7rem;
            }
            .quote-text {
                font-size: 0.95rem;
            }
        }

        @media (min-width: 576px) and (max-width: 991px) {
            .button-group {
                flex-direction: row;
                gap: 0.6rem;
            }
            .btn-quote {
                padding: 0.55rem;
                font-size: 0.75rem;
            }
            .materi-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 992px) and (max-width: 1199px) {
            .materi-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 1200px) and (max-width: 1399px) {
            .materi-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (min-width: 1400px) and (max-width: 1699px) {
            .materi-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        @media (min-width: 1700px) {
            .materi-grid {
                grid-template-columns: repeat(6, 1fr);
            }
        }

        /* Landscape mode untuk HP */
        @media (max-width: 896px) and (orientation: landscape) {
            body {
                padding: 0.5rem;
            }
            .app-container {
                padding: 0.8rem;
            }
            .materi-grid {
                gap: 0.8rem;
            }
            .quote-card {
                padding: 1rem;
            }
            .button-group {
                flex-direction: row;
                gap: 0.5rem;
            }
            .btn-quote {
                padding: 0.45rem;
                font-size: 0.7rem;
            }
            .quote-text {
                font-size: 0.85rem;
            }
            .quote-icon {
                font-size: 1.5rem;
            }
        }

        /* No result message */
        .no-result {
            text-align: center;
            padding: 2rem;
            color: #f59e0b;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 1rem;
            margin-top: 1.5rem;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0a1a15;
        }
        ::-webkit-scrollbar-thumb {
            background: #f59e0b;
            border-radius: 10px;
        }

        /* Animasi pulse untuk highlight pencarian */
        @keyframes pulseGlow {
            0% {
                box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4);
                border-left-color: #f59e0b;
            }
            70% {
                box-shadow: 0 0 0 8px rgba(245, 158, 11, 0);
                border-left-color: #fbbf24;
            }
            100% {
                box-shadow: 0 0 0 0 rgba(245, 158, 11, 0);
                border-left-color: #f59e0b;
            }
        }

        /* Spin animasi untuk refresh */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body class="theme-green">
    <div class="app-container">
        <div class="top-brand-bar">
            <div class="noxa-store">💬 NOXA STORE</div>
            <div class="judul-web-kanan">
                <h1>💭 Quotes - Kata Bijak & Motivasi</h1>
                <p>Kutipan inspiratif tanpa kategori & gambar • Warna neon bergantian setiap 5 detik</p>
            </div>
        </div>

        <!-- STATS + SEARCH -->
        <div class="top-stats-search">
            <div class="total-stats-box">
                <span>📊 <strong>Total Quotes:</strong> <span id="totalMateriCount">0</span></span>
                <span>✅ <strong>Dengan Link:</strong> <span id="materiSudahAda">0</span></span>
                <span>⏳ <strong>Tanpa Link:</strong> <span id="materiBelumAda">0</span></span>
            </div>
            <div class="search-section">
                <div class="search-row-flex">
                    <div class="search-wrapper">
                        <div class="search-icon">🔍</div>
                        <input type="text" id="searchInput" placeholder="Cari quotes, kata bijak, motivasi..." autocomplete="off">
                        <button id="clearSearchBtn" class="clear-btn">✖</button>
                    </div>
                    <button id="refreshButton" class="btn-refresh-neon"><span>⟳</span> Refresh</button>
                    <a href="mapel.html"><button class="btn-refresh-neon">Kembali</button></a>
                </div>
            </div>
        </div>

        <div class="stats-bar">
            <span id="resultCounter">📚 Menampilkan 0 quotes</span>
            <span class="shortcut-msg">⌨️ Ctrl+K / Shift+F / ESC</span>
            <span id="shortcutNotif" style="font-size:0.7rem;"></span>
        </div>

        <div class="materi-grid" id="materiContainer">
            <div class="quote-card" data-title="Jangan takut melangkah perlahan">
                <div class="quote-icon">"</div>
                <div class="quote-text">""</div>
                <div class="button-group">
                    <a href="" target="_blank" class="materi-link"><button class="btn-quote">📖 Baca Selengkapnya →</button></a>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            // Warna tema bergantian setiap 5 detik
            const colorThemes = ['theme-green', 'theme-blue', 'theme-cyan', 'theme-purple', 'theme-pink', 'theme-orange'];
            let currentThemeIndex = 0;
            const bodyEl = document.body;
            function applyNextTheme() {
                colorThemes.forEach(theme => bodyEl.classList.remove(theme));
                currentThemeIndex = (currentThemeIndex + 1) % colorThemes.length;
                bodyEl.classList.add(colorThemes[currentThemeIndex]);
            }
            setInterval(applyNextTheme, 5000);

            // DOM elements
            const searchInput = document.getElementById('searchInput');
            const materiContainer = document.getElementById('materiContainer');
            const resultCounterSpan = document.getElementById('resultCounter');
            const clearBtn = document.getElementById('clearSearchBtn');
            const shortcutNotifSpan = document.getElementById('shortcutNotif');
            const refreshBtn = document.getElementById('refreshButton');
            const allCards = Array.from(document.querySelectorAll('.quote-card'));

            // Update statistik (total, dengan link, tanpa link)
            function updateStatistik() {
                let sudahAda = 0;
                let belumAda = 0;
                allCards.forEach(card => {
                    const link = card.querySelector('.button-group .materi-link');
                    const href = link ? link.getAttribute('href') : '';
                    if (href && href !== '' && href !== '#') {
                        sudahAda++;
                    } else {
                        belumAda++;
                    }
                });
                document.getElementById('totalMateriCount').innerText = allCards.length;
                document.getElementById('materiSudahAda').innerText = sudahAda;
                document.getElementById('materiBelumAda').innerText = belumAda;
            }

            // Animasi fade in per card
            allCards.forEach((card, index) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(15px)';
                setTimeout(() => {
                    card.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, index * 50);
            });

            // Fungsi filter pencarian (berdasarkan teks quote dan data-title)
            function filterMateri() {
                const searchTerm = searchInput.value.trim().toLowerCase();
                let visibleCount = 0;
                allCards.forEach(card => {
                    const titleAttr = card.getAttribute('data-title') || '';
                    const quoteText = card.querySelector('.quote-text')?.innerText || '';
                    const searchableContent = (titleAttr + ' ' + quoteText).toLowerCase();
                    const isMatch = searchTerm === '' || searchableContent.includes(searchTerm);
                    card.style.display = isMatch ? '' : 'none';
                    if (isMatch) {
                        visibleCount++;
                        if (searchTerm !== '') {
                            card.style.animation = 'none';
                            card.offsetHeight;
                            card.style.animation = 'pulseGlow 0.4s ease';
                        }
                    }
                });
                let noResultDiv = document.getElementById('customNoResultMsg');
                if (searchTerm !== '' && visibleCount === 0) {
                    resultCounterSpan.innerHTML = '❌ Quotes tidak ditemukan';
                    resultCounterSpan.style.color = '#f59e0b';
                    if (!noResultDiv) {
                        const msgDiv = document.createElement('div');
                        msgDiv.id = 'customNoResultMsg';
                        msgDiv.className = 'no-result';
                        msgDiv.innerHTML = '💬 Maaf, quotes tidak ditemukan<br><span style="font-size:0.8rem;">Coba kata kunci lain</span>';
                        materiContainer.parentNode.insertBefore(msgDiv, materiContainer.nextSibling);
                    } else {
                        noResultDiv.style.display = 'block';
                    }
                } else {
                    resultCounterSpan.innerHTML = searchTerm !== '' ? `✨ Ditemukan ${visibleCount} quotes` : `📚 Menampilkan ${visibleCount} quotes`;
                    resultCounterSpan.style.color = '#fef3c7';
                    if (noResultDiv) noResultDiv.style.display = 'none';
                }
            }

            let debounceTimer;
            searchInput.addEventListener('input', () => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(filterMateri, 200);
            });

            if (clearBtn) {
                clearBtn.addEventListener('click', () => {
                    searchInput.value = '';
                    filterMateri();
                    searchInput.focus();
                    if (shortcutNotifSpan) {
                        shortcutNotifSpan.innerText = '⌨️ Pencarian dihapus';
                        setTimeout(() => shortcutNotifSpan.innerText = '', 1200);
                    }
                });
            }

            // Update status tombol (aktif/nonaktif berdasarkan href)
            function updateButtonsState() {
                document.querySelectorAll('.button-group .materi-link').forEach(link => {
                    const href = link.getAttribute('href');
                    const btn = link.querySelector('button');
                    if (!btn) return;
                    if (!href || href === '' || href === '#') {
                        btn.style.background = '#2a3a35';
                        btn.style.color = '#7a9a8a';
                        btn.style.border = '1px solid #3a5a4a';
                        btn.style.cursor = 'not-allowed';
                        btn.style.animation = 'none';
                        link.addEventListener('click', (e) => {
                            if (!href || href === '' || href === '#') e.preventDefault();
                        });
                    } else {
                        btn.style.background = '';
                        btn.style.cursor = 'pointer';
                        if (!link.getAttribute('target')) link.setAttribute('target', '_blank');
                    }
                });
                updateStatistik();
            }

            updateButtonsState();

            // Shortcut keyboard
            window.addEventListener('keydown', (e) => {
                if ((e.ctrlKey && e.key === 'k') || (e.ctrlKey && e.key === 'K')) {
                    e.preventDefault();
                    searchInput.focus();
                    if (shortcutNotifSpan) {
                        shortcutNotifSpan.innerText = '🔎 Ctrl+K fokus pencarian';
                        setTimeout(() => shortcutNotifSpan.innerText = '', 1500);
                    }
                }
                if (e.shiftKey && (e.key === 'F' || e.key === 'f')) {
                    e.preventDefault();
                    searchInput.focus();
                    if (shortcutNotifSpan) {
                        shortcutNotifSpan.innerText = '⚡ Shift+F fokus';
                        setTimeout(() => shortcutNotifSpan.innerText = '', 1500);
                    }
                }
                if (e.key === 'Escape') {
                    if (searchInput.value !== '') {
                        searchInput.value = '';
                        filterMateri();
                        if (shortcutNotifSpan) {
                            shortcutNotifSpan.innerText = '⌨️ Pencarian dibersihkan (ESC)';
                            setTimeout(() => shortcutNotifSpan.innerText = '', 1200);
                        }
                    } else {
                        searchInput.blur();
                    }
                }
            });

            // Refresh button
            if (refreshBtn) {
                refreshBtn.addEventListener('click', () => {
                    searchInput.value = '';
                    filterMateri();
                    const refreshIcon = refreshBtn.querySelector('span');
                    if (refreshIcon) {
                        refreshIcon.style.animation = 'spin 0.5s ease';
                        setTimeout(() => { refreshIcon.style.animation = ''; }, 500);
                    }
                    if (shortcutNotifSpan) {
                        shortcutNotifSpan.innerText = '⟳ Halaman disegarkan';
                        setTimeout(() => shortcutNotifSpan.innerText = '', 1200);
                    }
                    allCards.forEach(card => {
                        card.style.transform = 'scale(0.98)';
                        setTimeout(() => { card.style.transform = ''; }, 200);
                    });
                    updateButtonsState();
                });
            }

            // Inject spin animation jika belum ada
            if (!document.querySelector('#refreshSpinKeyframe')) {
                const spinStyle = document.createElement('style');
                spinStyle.id = 'refreshSpinKeyframe';
                spinStyle.textContent = `@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }`;
                document.head.appendChild(spinStyle);
            }

            filterMateri();
            console.log('✅ Noxa Store | Quotes tanpa kategori & gambar, 8 quotes, warna bergantian tiap 5 detik');
        })();
    </script>
</body>
